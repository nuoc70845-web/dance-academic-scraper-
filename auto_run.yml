name: Auto Academic Scraper

on:
  schedule:
    # 意思是：每两天在 UTC 时间 00:00（北京时间早上 08:00）自动运行一次
    - cron: '0 0 */2 * *'
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击按钮触发运行，方便测试

# 授予工作流向你的仓库写入文件（更新数据库）的权限
permissions:
  contents: write

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest

    steps:
    # 1. 下载仓库代码到云端虚拟机
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 配置 Python 3.13 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # 3. 安装脚本需要的依赖库
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-genai pydantic

    # 4. 运行爬虫脚本，并把刚刚配置的 Secret 作为环境变量传入
    - name: Run Scraper Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scraper.py

    # 5. 将更新后的数据库文件自动提交并推送回 GitHub 仓库
    - name: Commit and Push Database Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 检查数据库文件是否有变动
        git add academic_events.db
        if git diff --staged --quiet; then
          echo "数据库没有新数据更新，跳过提交。"
        else
          git commit -m "自动更新数据库 [skip ci]"
          git push
        fi
