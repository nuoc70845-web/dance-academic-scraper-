name: Auto Academic Scraper

on:
  workflow_dispatch:
    inputs:
      article_urls:
        description: "要采集的公众号文章链接；多篇文章可用英文逗号或换行分隔；可留空只采集网站"
        required: false
        type: string
      website_urls:
        description: "要采集的网站入口；留空则使用上海国际舞蹈中心、南京保利大剧院、江苏大剧院"
        required: false
        type: string


concurrency:
  group: auto-academic-scraper
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Sync latest database
      run: git pull --ff-only origin main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Dependencies
      run: pip install requests beautifulsoup4 google-genai pydantic

    - name: Run Scraper
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
        ARTICLE_URLS: ${{ inputs.article_urls }}
        WEBSITE_URLS: ${{ inputs.website_urls }}
      run: python -u ./scraper.py

    - name: Commit and Push Database Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -f academic_events.db
        if git diff --staged --quiet; then
          echo "没有检测到数据库更新。"
        else
          git commit -m "自动更新数据库 [skip ci]"
          git push
        fi
