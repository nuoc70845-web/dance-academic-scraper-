name: Auto Academic Scraper

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Dependencies
      run: pip install requests beautifulsoup4 google-genai pydantic

    - name: Run Scraper
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python ./scraper.py

    # 关键步骤：把生成的数据库文件提交并推送回仓库
    - name: Commit and Push Database Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 检查是否有文件变动
        git add academic_events.db
        if git diff --staged --quiet; then
          echo "没有检测到数据库更新。"
        else
          git commit -m "自动更新数据库 [skip ci]"
          git push
        fi
