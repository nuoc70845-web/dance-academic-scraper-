name: Auto Academic Scraper

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Dependencies
      run: pip install requests beautifulsoup4 google-genai pydantic

    - name: Run Scraper
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python ./scraper.py

# 关键步骤：把生成的数据库文件提交并推送回仓库
    - name: Commit and Push Database Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 使用 -f 强制添加，无视任何 .gitignore 规则
        git add -f academic_events.db
        
        if git diff --staged --quiet; then
          echo "没有检测到数据库更新。"
        else
          git commit -m "自动更新数据库 [skip ci]"
          
          # 【新增的关键行】在推送前，先拉取并合并 GitHub 上的最新修改
          git pull --rebase origin main
          
          git push
        fi
